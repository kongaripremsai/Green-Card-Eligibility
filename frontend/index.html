<!DOCTYPE html>
<html>
<head>
    <title>Green Card Checker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h2>Green Card Eligibility</h2>

<input type="text" id="education" placeholder="Education"><br>
<input type="number" id="investment" placeholder="Investment"><br>

<label>Family in US</label>
<input type="checkbox" id="family"><br>

<label>Job Offer</label>
<input type="checkbox" id="job"><br>

<label>Refugee</label>
<input type="checkbox" id="refugee"><br>

<label>Diversity Visa</label>
<input type="checkbox" id="dv"><br><br>

<button onclick="checkEligibility()">Check</button>

<p id="result"></p>

<script src="script.js"></script>

</body>
</html>
